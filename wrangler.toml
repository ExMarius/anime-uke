name = "anime-platform"
main = "src/index.js"
compatibility_date = "2024-12-18"

# D1 pentru datele existente
[[d1_databases]]
binding = "DB"
database_name = "anime-users-db"
database_id = "ID-UL-TĂU-D1"

# Durable Object pentru chat
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# Pentru fișiere statice (Pages)
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "anime-users-db"
database_id = "ID-UL-TĂU-D1"

[env.production.durable_objects.bindings]
name = "CHAT_ROOM"
class_name = "ChatRoom"
