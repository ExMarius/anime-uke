name = "anime-platform"
main = "src/index.js"
compatibility_date = "2024-12-18"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "anime-db"
database_id = "ID-UL-TĂU-D1-DIN-DASHBOARD"

# Durable Object pentru Chat
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# Environment variables (setează JWT_SECRET în dashboard)
[env.production]
vars = { JWT_SECRET = "schimba-asta-cu-un-secret-random" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "anime-db"
database_id = "ID-UL-TĂU-D1-DIN-DASHBOARD"

[env.production.durable_objects.bindings]
name = "CHAT_ROOM"
class_name = "ChatRoom"
