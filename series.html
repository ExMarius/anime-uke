<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie - AnimeHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .navbar {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #e94560; }
        .nav-links a {
            color: #eee;
            text-decoration: none;
            margin-left: 1.5rem;
        }
        .nav-links a:hover { color: #e94560; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; }
        .series-header {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .series-header h1 { color: #e94560; margin-bottom: 0.5rem; }
        .episode-list {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .episode-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .episode-item:hover { background: rgba(255,255,255,0.1); }
        .episode-number {
            font-weight: bold;
            color: #e94560;
            min-width: 80px;
        }
        .episode-title { flex: 1; }
        .episode-views { font-size: 12px; color: #888; }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #e94560;
            text-decoration: none;
        }
        .loading { text-align: center; padding: 2rem; }
        .points-badge {
            background: #e94560;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: #e94560;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-left: 1rem;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍥 AnimeHub</div>
        <div class="nav-links">
            <a href="/">Acasă</a>
            <a href="/series.html">Toate Seriile</a>
            <a href="/admin.html" id="adminLink" class="hidden">Admin</a>
            <a href="/login.html" id="loginLink">Login</a>
            <span id="userInfo" class="hidden">
                <span id="userPoints" class="points-badge">0 pts</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </span>
        </div>
    </nav>
    
    <div class="container">
        <div class="series-header" id="seriesHeader">
            <h1 id="seriesTitle">Încărcare...</h1>
            <p id="seriesDescription"></p>
        </div>
        
        <div class="episode-list">
            <h2>📺 Lista episoadelor</h2>
            <div id="episodesList" class="loading">Se încarcă episoadele...</div>
        </div>
        
        <a href="/" class="back-link">← Înapoi la pagina principală</a>
    </div>
    
    <script>
        let currentUser = null;
        let seriesData = null;
        
        async function loadUser() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    document.getElementById('loginLink').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userPoints').innerHTML = `${currentUser.points} pts`;
                    if (currentUser.role === 'admin') {
                        document.getElementById('adminLink').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('loginLink').classList.remove('hidden');
                    document.getElementById('userInfo').classList.add('hidden');
                }
            } catch(e) { console.error(e); }
        }
        
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }
        
        async function loadSeries() {
            const urlParams = new URLSearchParams(window.location.search);
            const seriesId = urlParams.get('id');
            
            if (!seriesId) {
                window.location.href = '/';
                return;
            }
            
            try {
                const res = await fetch(`/api/series/${seriesId}`);
                const data = await res.json();
                seriesData = data;
                
                document.getElementById('seriesTitle').textContent = data.series.title;
                document.getElementById('seriesDescription').textContent = data.series.description || 'Fără descriere.';
                
                const episodesContainer = document.getElementById('episodesList');
                if (data.episodes && data.episodes.length) {
                    episodesContainer.innerHTML = data.episodes.map(ep => `
                        <div class="episode-item" onclick="location.href='/episode.html?id=${ep.id}'">
                            <div class="episode-number">Ep. ${ep.episode_number}</div>
                            <div class="episode-title">${ep.title || `Episodul ${ep.episode_number}`}</div>
                            <div class="episode-views">👁️ ${ep.views || 0} vizualizări</div>
                        </div>
                    `).join('');
                } else {
                    episodesContainer.innerHTML = '<p>Niciun episod disponibil momentan.</p>';
                }
            } catch(e) {
                console.error(e);
                document.getElementById('episodesList').innerHTML = '<p>Eroare la încărcarea episoadelor.</p>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            loadSeries();
        });
    </script>
</body>
</html>
