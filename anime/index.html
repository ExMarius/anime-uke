<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeUke - Streaming Gratuit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="p-5 flex justify-between items-center bg-black/50 border-b border-orange-500">
        <h1 class="text-2xl font-bold text-orange-500">Anime<span class="text-white">Uke</span></h1>
        <div id="auth-section">
            <a href="/register" class="bg-orange-600 px-4 py-2 rounded font-bold hover:bg-orange-700">Cont Nou</a>
        </div>
    </nav>

    <header class="py-20 text-center">
        <h2 class="text-5xl font-extrabold mb-4">Uită-te la Anime și câștigă Puncte!</h2>
        <p class="text-gray-400">Fiecare episod vizionat îți aduce XP pentru profilul tău.</p>
    </header>

    <main class="max-w-4xl mx-auto p-5">
        <div class="bg-black aspect-video rounded-lg overflow-hidden border border-gray-700 relative">
            <iframe id="videoPlayer" class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
        </div>
        
        <div class="mt-5 p-4 bg-gray-800 rounded-lg flex justify-between items-center">
            <div>
                <h3 class="font-bold">Eroul lunii: <span id="userName">Vizitator</span></h3>
                <p class="text-sm text-gray-400">Puncte acumulate: <span id="userPoints" class="text-orange-500">0</span></p>
            </div>
            <button onclick="simuleazaVizionare()" class="text-xs bg-gray-700 px-3 py-1 rounded">Test Puncte (+10)</button>
        </div>
    </main>

    <script>
        // Logica simplă pentru a arăta că sistemul funcționează
        function simuleazaVizionare() {
            let p = document.getElementById('userPoints');
            p.innerText = parseInt(p.innerText) + 10;
            alert("Ai primit 10 puncte pentru vizionare!");
        }
    </script>
</body>
</html>
