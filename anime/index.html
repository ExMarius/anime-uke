<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Uke - Anime subtitrat în română</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">Anime Uke</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Acasă</a></li>
                    <li class="nav-item"><a class="nav-link" href="/anime">Anime</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile" id="profileLink">Profil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login" id="authLink">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Banner -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="bg-danger bg-gradient p-5 text-center rounded-4">
                    <h1 class="display-4">Anime Uke</h1>
                    <p class="lead">Anime subtitrat în limba română, gratuit</p>
                </div>
            </div>
        </div>

        <!-- Ultimele episoade -->
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="border-bottom border-danger pb-2">Ultimele episoade</h2>
            </div>
        </div>
        <div class="row" id="latestEpisodes">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
                <p>Se încarcă...</p>
            </div>
        </div>

        <!-- Toate seriile -->
        <div class="row mt-5 mb-4">
            <div class="col-12">
                <h2 class="border-bottom border-danger pb-2">Toate seriile</h2>
            </div>
        </div>
        <div class="row" id="allSeries">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
                <p>Se încarcă...</p>
            </div>
        </div>
    </div>

    <footer class="bg-black text-center text-muted py-4 mt-5 border-top border-secondary">
        <p>&copy; 2024 Anime Uke - Anime subtitrat în română</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Verifică dacă utilizatorul e logat
        checkAuth();
        // Încarcă ultimele episoade
        loadLatestEpisodes();
        // Încarcă toate seriile
        loadAllSeries();
    </script>
</body>
</html>
