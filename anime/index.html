<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime-Uke</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>⚡ Anime-Uke</h1>
            </div>
            <nav>
                <a href="/" class="active">Acasă</a>
                <a href="#" id="animeLink">Anime</a>
                <a href="#" id="profileLink">Profil</a>
            </nav>
            <div id="authButtons">
                <a href="/login.html" class="btn-login">Logare</a>
            </div>
        </header>

        <main>
            <section class="hero">
                <h2>Vizionează anime subtitrat în română</h2>
                <p>Grátis, fără reclame enervante</p>
            </section>

            <section class="anime-list">
                <h3>Anime disponibile</h3>
                <div class="anime-grid" id="animeGrid">
                    <!-- Anime-urile se încarcă aici -->
                </div>
            </section>
        </main>
    </div>

    <script>
        // Lista ta de anime-uri (completează cu ce ai)
        const animeList = [
            {
                id: "naruto",
                title: "Naruto",
                image: "https://cdn.anime-nexus.io/xpzuS3h3jyYsk.png",
                episodes: 220,
                doodstreamId: "YOUR_DOODSTREAM_ID_1"
            },
            {
                id: "bleach",
                title: "Bleach",
                image: "https://cdn.anime-nexus.io/uoc0Um0sAmqYU.jpg",
                episodes: 366,
                doodstreamId: "YOUR_DOODSTREAM_ID_2"
            },
            {
                id: "jujutsu-kaisen",
                title: "Jujutsu Kaisen",
                image: "https://cdn.anime-nexus.io/j4vz4FJzZK1Ud.jpg",
                episodes: 24,
                doodstreamId: "YOUR_DOODSTREAM_ID_3"
            }
        ];

        function renderAnimeGrid() {
            const grid = document.getElementById('animeGrid');
            if (!grid) return;
            
            grid.innerHTML = animeList.map(anime => `
                <div class="anime-card" data-id="${anime.id}" data-doodstream="${anime.doodstreamId}">
                    <div class="anime-image">
                        <img src="${anime.image}" alt="${anime.title}">
                    </div>
                    <div class="anime-info">
                        <h4>${anime.title}</h4>
                        <span class="episodes">${anime.episodes} episoade</span>
                    </div>
                </div>
            `).join('');

            // Adaugă click pe carduri
            document.querySelectorAll('.anime-card').forEach(card => {
                card.addEventListener('click', () => {
                    const animeId = card.dataset.id;
                    const doodstreamId = card.dataset.doodstream;
                    window.location.href = `/watch.html?id=${animeId}&dood=${doodstreamId}`;
                });
            });
        }

        renderAnimeGrid();

        // Verifică dacă ești logat
        async function checkAuth() {
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) return;
            
            const response = await fetch('/api/verify', {
                headers: { 'Authorization': `Bearer ${sessionId}` }
            });
            const data = await response.json();
            
            if (data.authenticated) {
                document.getElementById('authButtons').innerHTML = `
                    <span class="user-name">Bun venit, ${data.user.username}</span>
                    <a href="#" id="logoutBtn" class="btn-logout">Ieși</a>
                `;
                document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
                    e.preventDefault();
                    await fetch('/api/logout', {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('sessionId')}` }
                    });
                    localStorage.removeItem('sessionId');
                    window.location.href = '/';
                });
            }
        }
        checkAuth();
    </script>
</body>
</html>
