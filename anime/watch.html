<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Episode - Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-iframe {
            width: 100%;
            min-height: 500px;
            border: none;
        }
        .server-tab {
            background: #1a1a1a;
            border: none;
            color: #ddd;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .server-tab.active {
            background: #dc3545;
            color: white;
        }
        .server-tab:hover:not(.active) {
            background: #2c2c2c;
            transform: translateY(-2px);
        }
        .comment-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .comment-item {
            background: #252525;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .comment-item:hover {
            background: #2c2c2c;
        }
        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #dc3545;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .vote-btn {
            background: none;
            border: none;
            color: #aaa;
            transition: all 0.2s;
        }
        .vote-btn:hover {
            color: #dc3545;
            transform: scale(1.1);
        }
        .reply-btn {
            color: #dc3545;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .reply-btn:hover {
            text-decoration: underline;
        }
        .reply-form {
            margin-left: 50px;
            margin-top: 10px;
            display: none;
        }
        .child-comment {
            margin-left: 50px;
        }
        .episode-nav {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
        }
        .gold-earned {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffc107;
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .spoiler {
            background: #333;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            padding: 0 4px;
        }
        .spoiler:hover, .spoiler.revealed {
            background: transparent;
            color: inherit;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">Anime Uke</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Acasă</a></li>
                    <li class="nav-item"><a class="nav-link" href="/anime">Anime</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile" id="profileLink">Profil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login" id="authLink">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Navigare episoade -->
        <div class="episode-nav">
            <div class="row align-items-center">
                <div class="col-md-4 text-md-start text-center mb-2 mb-md-0">
                    <a id="prevEpisode" href="#" class="btn btn-outline-danger">
                        <i class="fas fa-chevron-left me-1"></i> Episodul anterior
                    </a>
                </div>
                <div class="col-md-4 text-center mb-2 mb-md-0">
                    <span id="seriesNameLink">
                        <a href="#" class="text-danger text-decoration-none">Încărcare...</a>
                    </span>
                    <span id="episodeNumberDisplay" class="text-muted"></span>
                </div>
                <div class="col-md-4 text-md-end text-center">
                    <a id="nextEpisode" href="#" class="btn btn-outline-danger">
                        Episodul următor <i class="fas fa-chevron-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Player video -->
        <div class="video-container">
            <iframe id="videoFrame" class="video-iframe" src="" allowfullscreen></iframe>
        </div>

        <!-- Server tabs -->
        <div class="mt-3">
            <div class="d-flex flex-wrap gap-2 justify-content-center" id="serverTabs">
                <div class="text-center text-muted py-3 w-100">Se încarcă serverele...</div>
            </div>
        </div>

        <!-- Acțiuni episod -->
        <div class="row mt-3">
            <div class="col-12 text-center">
                <button id="markWatchedBtn" class="btn btn-success me-2">
                    <i class="fas fa-check-circle me-1"></i> Marchez ca vizionat
                </button>
                <button id="reportEpisodeBtn" class="btn btn-warning">
                    <i class="fas fa-flag me-1"></i> Raportează episod
                </button>
            </div>
        </div>

        <!-- Secțiune comentarii -->
        <div class="comment-box">
            <h5 class="text-danger mb-3">
                <i class="fas fa-comments me-2"></i>Comentarii 
                <span id="commentCount" class="badge bg-secondary">0</span>
            </h5>
            
            <!-- Formular comentariu nou -->
            <div id="commentForm" class="mb-4">
                <textarea id="commentText" class="form-control bg-secondary text-light border-secondary mb-2" rows="3" placeholder="Scrie un comentariu... (minim 30 de cuvinte)"></textarea>
                <button id="submitComment" class="btn btn-danger">
                    <i class="fas fa-paper-plane me-1"></i> Postează comentariu
                </button>
                <small class="text-muted ms-2" id="wordCount">0 / 30 cuvinte</small>
            </div>
            
            <div id="replyFormContainer" style="display: none;">
                <div class="bg-secondary bg-opacity-25 p-2 rounded mb-2">
                    <i class="fas fa-reply me-1"></i> Răspunzi la <strong id="replyToUser"></strong>
                    <button id="cancelReply" class="btn btn-sm btn-secondary ms-2">Anulează</button>
                </div>
                <textarea id="replyText" class="form-control bg-secondary text-light border-secondary mb-2" rows="2" placeholder="Scrie răspunsul tău..."></textarea>
                <button id="submitReply" class="btn btn-danger btn-sm">
                    <i class="fas fa-paper-plane me-1"></i> Trimite răspuns
                </button>
            </div>
            
            <!-- Lista comentarii -->
            <div id="commentsList">
                <div class="text-center py-5">
                    <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                    <p>Se încarcă comentariile...</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-black text-center text-muted py-4 mt-5 border-top border-secondary">
        <p>&copy; 2024 Anime Uke - Anime subtitrat în română</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Obține parametrii din URL
        const pathParts = window.location.pathname.split('/');
        const seriesSlug = pathParts[2];
        const episodeNumber = parseInt(pathParts[3]);
        
        let currentUser = null;
        let currentEpisode = null;
        let currentSeries = null;
        let allComments = [];
        let replyToCommentId = null;
        let replyToUsername = null;
        let currentServer = null;
        
        (async () => {
            currentUser = await checkAuth();
            updateNavbar();
            
            await loadEpisodeData();
            await loadComments();
            await checkIfWatched();
            
            // Auto-detectare server preferat
            if (currentUser) {
                const prefs = await getUserPreferences();
                if (prefs && prefs.preferred_server && currentEpisode?.servers?.[prefs.preferred_server]) {
                    switchServer(prefs.preferred_server);
                } else if (currentEpisode?.servers) {
                    const firstServer = Object.keys(currentEpisode.servers)[0];
                    switchServer(firstServer);
                }
            } else if (currentEpisode?.servers) {
                const firstServer = Object.keys(currentEpisode.servers)[0];
                switchServer(firstServer);
            }
        })();
        
        async function loadEpisodeData() {
            try {
                const response = await fetch(`/api/series/${seriesSlug}/episode/${episodeNumber}`);
                const data = await response.json();
                currentEpisode = data.episode;
                currentSeries = data.series;
                
                document.title = `${currentSeries.name} Ep. ${episodeNumber} - Anime Uke`;
                document.getElementById('seriesNameLink').innerHTML = `<a href="/series/${seriesSlug}" class="text-danger text-decoration-none">${currentSeries.name}</a>`;
                document.getElementById('episodeNumberDisplay').textContent = `Episodul ${episodeNumber}`;
                
                // Render server tabs
                const servers = currentEpisode.servers || {};
                const serverTabs = document.getElementById('serverTabs');
                
                if (Object.keys(servers).length === 0) {
                    serverTabs.innerHTML = '<div class="text-center text-danger py-3">Nu există surse disponibile pentru acest episod.</div>';
                } else {
                    serverTabs.innerHTML = Object.keys(servers).map(server => `
                        <button class="server-tab" data-server="${server}">
                            <i class="fas fa-server me-1"></i>${server}
                        </button>
                    `).join('');
                    
                    // Adaugă event listeners
                    document.querySelectorAll('.server-tab').forEach(btn => {
                        btn.addEventListener('click', () => switchServer(btn.dataset.server));
                    });
                }
                
                // Navigare episoade
                if (currentEpisode.prev_episode) {
                    document.getElementById('prevEpisode').href = `/watch/${seriesSlug}/${currentEpisode.prev_episode}`;
                } else {
                    document.getElementById('prevEpisode').classList.add('disabled');
                    document.getElementById('prevEpisode').href = '#';
                }
                
                if (currentEpisode.next_episode) {
                    document.getElementById('nextEpisode').href = `/watch/${seriesSlug}/${currentEpisode.next_episode}`;
                } else {
                    document.getElementById('nextEpisode').classList.add('disabled');
                    document.getElementById('nextEpisode').href = '#';
                }
            } catch (error) {
                console.error('Eroare la încărcarea episodului:', error);
            }
        }
        
        function switchServer(serverName) {
            if (!currentEpisode?.servers?.[serverName]) return;
            
            currentServer = serverName;
            const videoUrl = currentEpisode.servers[serverName];
            document.getElementById('videoFrame').src = videoUrl;
            
            // Activează tab-ul curent
            document.querySelectorAll('.server-tab').forEach(btn => {
                if (btn.dataset.server === serverName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Auto-mark ca vizionat după 5 minute
            setTimeout(() => {
                markAsWatched(true);
            }, 300000); // 5 minute
        }
        
        async function markAsWatched(auto = true) {
            if (!currentUser) return;
            
            const response = await fetch('/api/episode/watched', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({
                    series_slug: seriesSlug,
                    episode_number: episodeNumber
                })
            });
            
            const result = await response.json();
            if (result.success && result.gold_earned) {
                showGoldEarned(result.gold_earned);
            }
        }
        
        function showGoldEarned(amount) {
            const notification = document.createElement('div');
            notification.className = 'gold-earned';
            notification.innerHTML = `<i class="fas fa-coins me-1"></i> +${amount} Gold`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        async function checkIfWatched() {
            if (!currentUser) return;
            
            const response = await fetch(`/api/episode/watched/${seriesSlug}/${episodeNumber}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const result = await response.json();
            if (result.watched) {
                document.getElementById('markWatchedBtn').innerHTML = '<i class="fas fa-check-circle me-1"></i> Vizionat!';
                document.getElementById('markWatchedBtn').disabled = true;
            }
        }
        
        document.getElementById('markWatchedBtn').addEventListener('click', () => markAsWatched(false));
        
        // Comentarii
        async function loadComments() {
            try {
                const response = await fetch(`/api/comments/${seriesSlug}/${episodeNumber}`);
                const data = await response.json();
                allComments = data.comments || [];
                renderComments();
            } catch (error) {
                console.error('Eroare la încărcarea comentariilor:', error);
            }
        }
        
        function renderComments() {
            const container = document.getElementById('commentsList');
            document.getElementById('commentCount').textContent = allComments.length;
            
            if (allComments.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-4">Niciun comentariu încă. Fii primul care comentează!</div>';
                return;
            }
            
            // Grupează comentariile (părinți și copii)
            const parents = allComments.filter(c => !c.parent_id);
            const children = allComments.filter(c => c.parent_id);
            
            container.innerHTML = parents.map(parent => `
                <div class="comment-item" data-comment-id="${parent.id}">
                    <div class="d-flex gap-3">
                        <div class="comment-avatar">${(parent.username || 'U')[0].toUpperCase()}</div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-center flex-wrap">
                                <div>
                                    <strong>${escapeHtml(parent.username || 'Anonim')}</strong>
                                    <small class="text-muted ms-2">${new Date(parent.created_at).toLocaleDateString('ro-RO')}</small>
                                </div>
                                <div>
                                    <button class="vote-btn" data-id="${parent.id}" data-vote="up">
                                        <i class="fas fa-thumbs-up"></i> <span class="vote-count">${parent.votes || 0}</span>
                                    </button>
                                </div>
                            </div>
                            <div class="mt-2 comment-content">${formatCommentText(parent.content)}</div>
                            <div class="mt-2">
                                <span class="reply-btn" data-id="${parent.id}" data-username="${escapeHtml(parent.username)}">
                                    <i class="fas fa-reply me-1"></i>Răspunde
                                </span>
                            </div>
                            ${renderChildrenComments(children, parent.id)}
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Reattach events
            attachCommentEvents();
        }
        
        function renderChildrenComments(children, parentId, level = 1) {
            const childComments = children.filter(c => c.parent_id === parentId);
            if (childComments.length === 0) return '';
            
            return `
                <div class="mt-3" style="margin-left: ${Math.min(level * 30, 90)}px">
                    ${childComments.map(child => `
                        <div class="comment-item mb-2" data-comment-id="${child.id}">
                            <div class="d-flex gap-3">
                                <div class="comment-avatar" style="width: 30px; height: 30px; font-size: 12px;">${(child.username || 'U')[0].toUpperCase()}</div>
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-center flex-wrap">
                                        <div>
                                            <strong>${escapeHtml(child.username || 'Anonim')}</strong>
                                            <small class="text-muted ms-2">${new Date(child.created_at).toLocaleDateString('ro-RO')}</small>
                                        </div>
                                        <div>
                                            <button class="vote-btn" data-id="${child.id}" data-vote="up">
                                                <i class="fas fa-thumbs-up"></i> <span class="vote-count">${child.votes || 0}</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="mt-2 comment-content">${formatCommentText(child.content)}</div>
                                    <div class="mt-2">
                                        <span class="reply-btn" data-id="${child.id}" data-username="${escapeHtml(child.username)}">
                                            <i class="fas fa-reply me-1"></i>Răspunde
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function formatCommentText(text) {
            if (!text) return '';
            // Spoiler tags
            text = text.replace(/\[spoiler\](.*?)\[\/spoiler\]/g, '<span class="spoiler">$1</span>');
            // Bold
            text = text.replace(/\[b\](.*?)\[\/b\]/g, '<strong>$1</strong>');
            // Italic
            text = text.replace(/\[i\](.*?)\[\/i\]/g, '<em>$1</em>');
            // Line breaks
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        
        function attachCommentEvents() {
            // Spoiler click
            document.querySelectorAll('.spoiler').forEach(el => {
                el.addEventListener('click', () => el.classList.add('revealed'));
            });
            
            // Vote buttons
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (!currentUser) {
                        alert('Trebuie să fii logat pentru a vota!');
                        return;
                    }
                    const commentId = btn.dataset.id;
                    const response = await fetch('/api/comments/vote', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify({ comment_id: parseInt(commentId) })
                    });
                    const result = await response.json();
                    if (result.success) {
                        const voteSpan = btn.querySelector('.vote-count');
                        if (voteSpan) voteSpan.textContent = result.votes;
                    }
                });
            });
            
            // Reply buttons
            document.querySelectorAll('.reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    replyToCommentId = parseInt(btn.dataset.id);
                    replyToUsername = btn.dataset.username;
                    document.getElementById('replyToUser').textContent = replyToUsername;
                    document.getElementById('replyFormContainer').style.display = 'block';
                    document.getElementById('commentForm').style.display = 'none';
                    document.getElementById('replyText').focus();
                });
            });
        }
        
        document.getElementById('cancelReply').addEventListener('click', () => {
            replyToCommentId = null;
            replyToUsername = null;
            document.getElementById('replyFormContainer').style.display = 'none';
            document.getElementById('commentForm').style.display = 'block';
            document.getElementById('replyText').value = '';
        });
        
        // Word count pentru comentarii
        document.getElementById('commentText').addEventListener('input', (e) => {
            const words = e.target.value.trim().split(/\s+/).filter(w => w.length > 0);
            const count = words.length;
            document.getElementById('wordCount').textContent = `${count} / 30 cuvinte`;
            document.getElementById('submitComment').disabled = count < 30;
        });
        
        document.getElementById('submitComment').addEventListener('click', async () => {
            if (!currentUser) {
                alert('Trebuie să fii logat pentru a comenta!');
                return;
            }
            const content = document.getElementById('commentText').value.trim();
            if (content.length < 30) {
                alert('Comentariul trebuie să aibă minim 30 de caractere!');
                return;
            }
            
            const response = await fetch('/api/comments', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({
                    series_slug: seriesSlug,
                    episode_number: episodeNumber,
                    content: content
                })
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('commentText').value = '';
                document.getElementById('wordCount').textContent = '0 / 30 cuvinte';
                await loadComments();
            } else {
                alert('Eroare: ' + result.message);
            }
        });
        
        document.getElementById('submitReply').addEventListener('click', async () => {
            if (!currentUser) {
                alert('Trebuie să fii logat pentru a răspunde!');
                return;
            }
            if (!replyToCommentId) return;
            
            const content = document.getElementById('replyText').value.trim();
            if (content.length < 10) {
                alert('Răspunsul trebuie să aibă minim 10 caractere!');
                return;
            }
            
            const response = await fetch('/api/comments', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({
                    series_slug: seriesSlug,
                    episode_number: episodeNumber,
                    content: content,
                    parent_id: replyToCommentId
                })
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('replyText').value = '';
                document.getElementById('cancelReply').click();
                await loadComments();
            } else {
                alert('Eroare: ' + result.message);
            }
        });
        
        document.getElementById('reportEpisodeBtn').addEventListener('click', () => {
            const reason = prompt('Motivul raportării:');
            if (reason) {
                alert('Mulțumim pentru raport! Vom verifica episodul.');
            }
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
