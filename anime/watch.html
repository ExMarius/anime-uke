<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime-Uke - Vizionare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>⚡ Anime-Uke</h1>
            </div>
            <nav>
                <a href="/">Acasă</a>
                <a href="#" id="animeLink">Anime</a>
            </nav>
            <div id="authButtons">
                <a href="/login.html" class="btn-login">Logare</a>
            </div>
        </header>

        <main class="watch-main">
            <div class="video-container">
                <iframe id="doodstreamIframe" 
                        src="" 
                        frameborder="0" 
                        allowfullscreen
                        allow="autoplay; fullscreen">
                </iframe>
            </div>
            
            <div class="video-info">
                <h2 id="animeTitle">Încărcare...</h2>
                <div class="episode-selector">
                    <label>Episod: </label>
                    <select id="episodeSelect"></select>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Ia parametrii din URL
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id');
        const baseDoodstreamId = urlParams.get('dood');

        // Configurare episoade
        const episodes = [];
        for (let i = 1; i <= 12; i++) {
            episodes.push({
                number: i,
                doodstreamId: `${baseDoodstreamId}_ep${i}`
            });
        }

        function loadEpisode(episodeNumber) {
            const episode = episodes.find(e => e.number === parseInt(episodeNumber));
            if (episode) {
                const doodUrl = `https://doodstream.com/e/${episode.doodstreamId}`;
                document.getElementById('doodstreamIframe').src = doodUrl;
                
                // Salvează progresul în localStorage dacă e logat
                const sessionId = localStorage.getItem('sessionId');
                if (sessionId) {
                    saveProgress(animeId, episodeNumber);
                }
            }
        }

        async function saveProgress(animeId, episode) {
            // Poți salva progresul în D1 dacă vrei
            console.log(`Saved progress: ${animeId} - episode ${episode}`);
        }

        // Populează selectorul de episoade
        function populateEpisodeSelector() {
            const select = document.getElementById('episodeSelect');
            select.innerHTML = episodes.map(ep => 
                `<option value="${ep.number}">Episodul ${ep.number}</option>`
            ).join('');
            
            select.addEventListener('change', (e) => {
                loadEpisode(e.target.value);
            });
        }

        // Setează titlul
        document.getElementById('animeTitle').innerText = decodeURIComponent(animeId || 'Anime');
        populateEpisodeSelector();
        
        // Încarcă primul episod
        if (episodes.length > 0) {
            loadEpisode(1);
        }

        // Verifică autentificarea
        async function checkAuth() {
            const sessionId = localStorage.getItem('sessionId');
            if (!sessionId) return;
            
            const response = await fetch('/api/verify', {
                headers: { 'Authorization': `Bearer ${sessionId}` }
            });
            const data = await response.json();
            
            if (data.authenticated) {
                document.getElementById('authButtons').innerHTML = `
                    <span class="user-name">${data.user.username}</span>
                    <a href="#" id="logoutBtn" class="btn-logout">Ieși</a>
                `;
                document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
                    e.preventDefault();
                    await fetch('/api/logout', {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('sessionId')}` }
                    });
                    localStorage.removeItem('sessionId');
                    window.location.href = '/';
                });
            }
        }
        checkAuth();
    </script>
</body>
</html>
