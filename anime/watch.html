<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizionează Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #e0e0e0; }
        .navbar { background: #000 !important; border-bottom: 1px solid #dc3545; }
        .video-container { background: #000; border-radius: 12px; overflow: hidden; }
        .video-iframe { width: 100%; min-height: 500px; border: none; }
        .episode-list { background: #1a1a1a; border-radius: 12px; padding: 20px; }
        .episode-btn { 
            background: #2c2c2c; 
            border: none; 
            color: white; 
            padding: 10px 15px; 
            margin: 5px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .episode-btn:hover, .episode-btn.active { background: #dc3545; transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">Anime Uke</a>
            <a href="/" class="btn btn-outline-danger">← Înapoi</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="video-container mb-4">
            <iframe id="videoFrame" class="video-iframe" src="" allowfullscreen></iframe>
        </div>

        <div class="episode-list">
            <h4 class="text-danger mb-3" id="seriesTitle">Selectează episodul</h4>
            <div id="episodeButtons" class="d-flex flex-wrap"></div>
        </div>
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <p>&copy; 2024 Anime Uke</p>
    </footer>

    <script>
        // URL-urile episoadelor (le adaugi manual aici)
        const episodesData = {
            "naruto": {
                name: "Naruto",
                episodes: {
                    1: "https://dood.li/e/example1",
                    2: "https://dood.li/e/example2",
                    3: "https://dood.li/e/example3"
                }
            },
            "one-piece": {
                name: "One Piece",
                episodes: {
                    1: "https://dood.li/e/op1",
                    2: "https://dood.li/e/op2",
                    3: "https://dood.li/e/op3"
                }
            },
            "bleach": {
                name: "Bleach",
                episodes: {
                    1: "https://dood.li/e/bleach1",
                    2: "https://dood.li/e/bleach2"
                }
            },
            "aot": {
                name: "Attack on Titan",
                episodes: {
                    1: "https://dood.li/e/aot1",
                    2: "https://dood.li/e/aot2"
                }
            },
            "demon-slayer": {
                name: "Demon Slayer",
                episodes: {
                    1: "https://dood.li/e/ds1",
                    2: "https://dood.li/e/ds2"
                }
            },
            "jujutsu": {
                name: "Jujutsu Kaisen",
                episodes: {
                    1: "https://dood.li/e/jjk1",
                    2: "https://dood.li/e/jjk2"
                }
            }
        };

        // Ia seria din URL
        const urlParams = new URLSearchParams(window.location.search);
        const seriesSlug = urlParams.get('series');
        
        const series = episodesData[seriesSlug];
        
        if (series) {
            document.getElementById('seriesTitle').textContent = series.name;
            const episodes = series.episodes;
            const container = document.getElementById('episodeButtons');
            
            // Creează butoane pentru episoade
            Object.keys(episodes).sort((a,b) => a-b).forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'episode-btn';
                btn.textContent = `Episodul ${num}`;
                btn.onclick = () => {
                    document.getElementById('videoFrame').src = episodes[num];
                    // Marchează butonul activ
                    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                container.appendChild(btn);
            });
            
            // Auto-load primul episod
            const firstEp = Object.keys(episodes).sort((a,b) => a-b)[0];
            if (firstEp) {
                document.getElementById('videoFrame').src = episodes[firstEp];
                container.firstChild?.classList.add('active');
            }
        } else {
            document.getElementById('seriesTitle').textContent = 'Serie negăsită';
            document.getElementById('episodeButtons').innerHTML = '<div class="text-danger">Această serie nu există în baza noastră de date.</div>';
        }
    </script>
</body>
</html>
