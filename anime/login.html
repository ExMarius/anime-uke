<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime-Uke - Autentificare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><h1>⚡ Anime-Uke</h1></div>
            <nav><a href="/">Acasă</a></nav>
        </header>
        <main class="auth-main">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button id="loginTab" class="active">Logare</button>
                    <button id="registerTab">Înregistrare</button>
                </div>
                
                <div id="loginForm" class="auth-form active">
                    <h3>Bun venit înapoi!</h3>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Parolă">
                    <button id="doLoginBtn">Loghează-te</button>
                    <div id="loginMsg" style="color:red; margin-top:10px;"></div>
                </div>

                <div id="registerForm" class="auth-form">
                    <h3>Creează cont nou</h3>
                    <input type="text" id="regUsername" placeholder="Username">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Parolă">
                    <button id="doRegisterBtn">Înregistrează-te</button>
                    <div id="regMsg" style="color:red; margin-top:10px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Switch between login and register forms
        document.getElementById('loginTab').onclick = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        };
        
        document.getElementById('registerTab').onclick = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        };
        
        // Start with register form hidden
        document.getElementById('registerForm').style.display = 'none';
        
        // REGISTER
        document.getElementById('doRegisterBtn').onclick = async function() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msgDiv = document.getElementById('regMsg');
            
            msgDiv.innerText = 'Se înregistrează...';
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    msgDiv.style.color = 'green';
                    msgDiv.innerText = 'Cont creat! Te poți loga.';
                    // Switch to login form
                    document.getElementById('loginTab').click();
                    // Clear register form
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    msgDiv.style.color = 'red';
                    msgDiv.innerText = data.error || 'Eroare la înregistrare';
                }
            } catch(err) {
                msgDiv.style.color = 'red';
                msgDiv.innerText = 'Eroare: ' + err.message;
            }
        };
        
        // LOGIN
        document.getElementById('doLoginBtn').onclick = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMsg');
            
            msgDiv.innerText = 'Se autentifică...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('sessionId', data.sessionId);
                    window.location.href = '/';
                } else {
                    msgDiv.style.color = 'red';
                    msgDiv.innerText = data.error || 'Email sau parolă greșită';
                }
            } catch(err) {
                msgDiv.style.color = 'red';
                msgDiv.innerText = 'Eroare: ' + err.message;
            }
        };
    </script>
</body>
</html>
