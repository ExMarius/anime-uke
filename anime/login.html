<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">Anime Uke</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Acasă</a></li>
                    <li class="nav-item"><a class="nav-link" href="/anime">Anime</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Înregistrare</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-black border-secondary">
                    <div class="card-header bg-danger text-white text-center">
                        <h3><i class="fas fa-sign-in-alt me-2"></i>Autentificare</h3>
                    </div>
                    <div class="card-body">
                        <div id="errorMsg" class="alert alert-danger d-none"></div>
                        <div id="successMsg" class="alert alert-success d-none"></div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Nume utilizator sau email</label>
                                <input type="text" class="form-control bg-secondary text-light border-secondary" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Parolă</label>
                                <input type="password" class="form-control bg-secondary text-light border-secondary" id="password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Ține-mă minte</label>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>Intră în cont
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <a href="/register" class="text-danger">Nu ai cont? Înregistrează-te!</a>
                        <br>
                        <a href="#" class="text-muted small" id="forgotPassword">Ai uitat parola?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-black text-center text-muted py-4 mt-5 border-top border-secondary">
        <p>&copy; 2024 Anime Uke - Anime subtitrat în română</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Verifică dacă e deja logat
        checkAuthAndRedirect();
        
        // Handle login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            const result = await login(username, password, remember);
            if (result.success) {
                window.location.href = '/';
            } else {
                showError(result.message);
            }
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.classList.remove('d-none');
            setTimeout(() => errorDiv.classList.add('d-none'), 5000);
        }
    </script>
</body>
</html>
