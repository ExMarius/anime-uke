<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime-Uke - Autentificare</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><h1>⚡ Anime-Uke</h1></div>
            <nav><a href="/">Acasă</a></nav>
            <div id="authButtons"></div>
        </header>
        <main class="auth-main">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button id="loginTab" class="active">Logare</button>
                    <button id="registerTab">Înregistrare</button>
                </div>
                <div id="loginForm" class="auth-form active">
                    <h3>Bun venit înapoi!</h3>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Parolă" required>
                    <button id="doLogin" class="btn-submit">Loghează-te</button>
                    <div id="loginError" class="error-message"></div>
                </div>
                <div id="registerForm" class="auth-form">
                    <h3>Creează cont nou</h3>
                    <input type="text" id="regUsername" placeholder="Username" required>
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <input type="password" id="regPassword" placeholder="Parolă" required>
                    <button id="doRegister" class="btn-submit">Înregistrează-te</button>
                    <div id="registerError" class="error-message"></div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // --- Înregistrare ---
        document.getElementById('doRegister').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('registerError');
            
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await response.json();
            if (data.success) {
                alert('Cont creat! Te poți loga.');
                document.getElementById('loginTab').click();
            } else {
                errorDiv.innerText = data.error || 'Eroare la înregistrare';
            }
        });

        // --- Autentificare ---
        document.getElementById('doLogin').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (data.success) {
                localStorage.setItem('sessionId', data.sessionId);
                window.location.href = '/';
            } else {
                errorDiv.innerText = data.error || 'Email sau parolă greșită';
            }
        });

        // --- Tabs (păstrează funcționalitatea) ---
        document.getElementById('loginTab').addEventListener('click', () => {
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
        });
        document.getElementById('registerTab').addEventListener('click', () => {
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
        });

        // --- Verifică dacă e deja logat ---
        (async () => {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                const response = await fetch('/api/verify', {
                    headers: { 'Authorization': `Bearer ${sessionId}` }
                });
                const data = await response.json();
                if (data.authenticated) window.location.href = '/';
            }
        })();
    </script>
</body>
</html>
