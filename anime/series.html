<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Name - Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .series-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .series-image {
            width: 100%;
            max-width: 200px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .episode-card {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.2s;
            border-left: 4px solid #dc3545;
        }
        .episode-card:hover {
            background: #252525;
            transform: translateX(5px);
        }
        .episode-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #dc3545;
        }
        .server-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .server-btn {
            background: #2c2c2c;
            border: none;
            color: #ddd;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .server-btn:hover {
            background: #dc3545;
            color: white;
            transform: scale(1.05);
        }
        .info-label {
            color: #dc3545;
            font-weight: bold;
            min-width: 120px;
            display: inline-block;
        }
        .genre-tag {
            background: #2c2c2c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 5px;
            display: inline-block;
        }
        .rating-stars {
            color: #ffc107;
        }
        .episode-title {
            font-size: 0.9rem;
            color: #aaa;
            margin-left: 15px;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">Anime Uke</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Acasă</a></li>
                    <li class="nav-item"><a class="nav-link" href="/anime">Anime</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile" id="profileLink">Profil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login" id="authLink">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Header serie -->
        <div id="seriesHeader" class="series-header">
            <div class="row">
                <div class="col-md-3 text-center text-md-start">
                    <img id="seriesImage" src="" alt="" class="series-image">
                </div>
                <div class="col-md-9">
                    <h1 id="seriesName" class="text-danger mb-3">Încărcare...</h1>
                    <div class="mb-3">
                        <span class="info-label"><i class="fas fa-calendar me-1"></i> Rating:</span>
                        <span id="seriesRating" class="rating-stars">★★★★★</span>
                        <span id="ratingValue" class="ms-2">0/10</span>
                    </div>
                    <div class="mb-3">
                        <span class="info-label"><i class="fas fa-tag me-1"></i> Genuri:</span>
                        <span id="seriesGenres">Acțiune, Aventură, Comedie</span>
                    </div>
                    <div class="mb-3">
                        <span class="info-label"><i class="fas fa-calendar-alt me-1"></i> Vârstă minimă:</span>
                        <span id="seriesMinAge">13+</span>
                    </div>
                    <div class="mb-3">
                        <span class="info-label"><i class="fas fa-info-circle me-1"></i> Descriere:</span>
                        <p id="seriesDescription" class="mt-2">Se încarcă...</p>
                    </div>
                    <div class="mb-3">
                        <span class="info-label"><i class="fas fa-layer-group me-1"></i> Genuri:</span>
                        <div id="genresContainer" class="d-inline">
                            <span class="genre-tag">Acțiune</span>
                            <span class="genre-tag">Aventură</span>
                            <span class="genre-tag">Comedie</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lista episoade -->
        <div class="card bg-black border-secondary">
            <div class="card-header bg-danger text-white">
                <h5><i class="fas fa-list me-2"></i>Lista episoadelor</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <input type="text" id="searchEpisode" class="form-control bg-secondary text-light border-secondary" placeholder="Caută episod...">
                </div>
                <div id="episodesList">
                    <div class="text-center py-5">
                        <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                        <p>Se încarcă episoadele...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-black text-center text-muted py-4 mt-5 border-top border-secondary">
        <p>&copy; 2024 Anime Uke - Anime subtitrat în română</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Obține slug-ul din URL
        const pathParts = window.location.pathname.split('/');
        const seriesSlug = pathParts[pathParts.length - 1] || pathParts[2];
        
        let currentUser = null;
        let currentSeries = null;
        let allEpisodes = [];
        let preferredServer = 'DoodStream';
        
        (async () => {
            // Verifică autentificarea
            currentUser = await checkAuth();
            updateNavbar();
            
            // Încarcă preferința serverului
            if (currentUser) {
                const prefs = await getUserPreferences();
                if (prefs && prefs.preferred_server) {
                    preferredServer = prefs.preferred_server;
                }
            }
            
            // Încarcă datele seriei
            await loadSeriesData();
            
            // Încarcă episoadele
            await loadEpisodes();
        })();
        
        async function loadSeriesData() {
            try {
                const response = await fetch(`/api/series/${seriesSlug}`);
                const series = await response.json();
                currentSeries = series;
                
                document.getElementById('seriesName').textContent = series.name;
                document.getElementById('seriesDescription').textContent = series.description || 'Nu există descriere disponibilă.';
                document.getElementById('seriesMinAge').textContent = series.min_age ? `${series.min_age}+` : 'Toate vârstele';
                
                if (series.image_url) {
                    document.getElementById('seriesImage').src = series.image_url;
                } else {
                    document.getElementById('seriesImage').src = 'https://placehold.co/200x280/1a1a1a/dc3545?text=No+Image';
                }
                
                // Rating
                const rating = series.avg_rating || 0;
                const fullStars = Math.floor(rating / 2);
                const halfStar = (rating % 2) >= 1;
                let starsHtml = '';
                for (let i = 0; i < fullStars; i++) starsHtml += '<i class="fas fa-star"></i>';
                if (halfStar) starsHtml += '<i class="fas fa-star-half-alt"></i>';
                for (let i = starsHtml.length / (halfStar ? 2 : 1); i < 5; i++) starsHtml += '<i class="far fa-star"></i>';
                document.getElementById('seriesRating').innerHTML = starsHtml;
                document.getElementById('ratingValue').textContent = `${rating}/10`;
                
                // Genuri
                if (series.genres && series.genres.length) {
                    document.getElementById('genresContainer').innerHTML = series.genres.map(g => 
                        `<span class="genre-tag">${g}</span>`
                    ).join('');
                }
                
                document.title = `${series.name} - Anime Uke`;
            } catch (error) {
                console.error('Eroare la încărcarea seriei:', error);
                document.getElementById('seriesName').textContent = 'Serie negăsită';
            }
        }
        
        async function loadEpisodes() {
            try {
                const response = await fetch(`/api/series/${seriesSlug}/episodes`);
                const data = await response.json();
                allEpisodes = data.episodes || [];
                
                renderEpisodes(allEpisodes);
            } catch (error) {
                console.error('Eroare la încărcarea episoadelor:', error);
                document.getElementById('episodesList').innerHTML = `
                    <div class="text-center py-5 text-danger">
                        <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                        <p>Eroare la încărcarea episoadelor</p>
                    </div>
                `;
            }
        }
        
        function renderEpisodes(episodes) {
            const container = document.getElementById('episodesList');
            
            if (!episodes || episodes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-video-slash fa-2x mb-2"></i>
                        <p>Nu există episoade disponibile pentru această serie.</p>
                    </div>
                `;
                return;
            }
            
            // Sortează episoadele crescător
            episodes.sort((a, b) => a.episode_number - b.episode_number);
            
            container.innerHTML = episodes.map(ep => {
                const servers = ep.servers || {};
                const serverKeys = Object.keys(servers);
                const hasPreferred = serverKeys.includes(preferredServer);
                
                return `
                    <div class="episode-card">
                        <div class="d-flex flex-wrap align-items-center justify-content-between">
                            <div>
                                <span class="episode-number">Episodul ${ep.episode_number}</span>
                                ${ep.title ? `<span class="episode-title">${escapeHtml(ep.title)}</span>` : ''}
                            </div>
                            <div class="server-buttons">
                                ${serverKeys.map(server => `
                                    <a href="/watch/${seriesSlug}/${ep.episode_number}?server=${encodeURIComponent(server)}" 
                                       class="server-btn ${server === preferredServer ? 'bg-danger text-white' : ''}"
                                       data-server="${server}">
                                        <i class="fas fa-play-circle me-1"></i>${server}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Căutare episoade
        document.getElementById('searchEpisode').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allEpisodes.filter(ep => 
                ep.episode_number.toString().includes(searchTerm) ||
                (ep.title && ep.title.toLowerCase().includes(searchTerm))
            );
            renderEpisodes(filtered);
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
