<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #e0e0e0; }
        .navbar { background: #000 !important; border-bottom: 2px solid #dc3545; }
        .card { background: #1a1a1a; border: none; border-radius: 16px; }
        .card-header { background: #dc3545; border-radius: 16px 16px 0 0; }
        .form-control, .form-select { background: #2c2c2c; border: none; color: white; }
        .form-control:focus, .form-select:focus { background: #2c2c2c; color: white; box-shadow: 0 0 0 2px #dc3545; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #b02a37; }
        .list-group-item { background: #1a1a1a; border-color: #2c2c2c; color: #e0e0e0; }
        .server-group { background: #2c2c2c; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .nav-tabs .nav-link { color: #e0e0e0; }
        .nav-tabs .nav-link.active { background: #dc3545; color: white; border: none; }
        .nav-tabs { border-bottom-color: #2c2c2c; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">Anime Uke</a>
            <a href="/" class="btn btn-outline-danger">← Acasă</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="adminCheck" class="alert alert-danger d-none">
            <i class="fas fa-exclamation-triangle me-2"></i>Nu ai permisiunea de a accesa această pagină.
        </div>

        <div id="adminContent" class="d-none">
            <ul class="nav nav-tabs mb-4" id="adminTabs">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#addSeries">Adaugă Serie</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#addEpisode">Adaugă Episod</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#manage">Gestionare</a>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Adaugă Serie -->
                <div class="tab-pane fade show active" id="addSeries">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-plus-circle me-2"></i>Serie nouă</h5>
                        </div>
                        <div class="card-body">
                            <form id="addSeriesForm">
                                <div class="mb-3">
                                    <label class="form-label">Nume serie *</label>
                                    <input type="text" class="form-control" id="seriesName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">URL slug (opțional)</label>
                                    <input type="text" class="form-control" id="seriesSlug" placeholder="ex: naruto-shippuden">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Descriere</label>
                                    <textarea class="form-control" id="seriesDescription" rows="3"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Imagine URL</label>
                                    <input type="url" class="form-control" id="seriesImage" placeholder="https://...">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Vârstă minimă</label>
                                    <select class="form-select" id="seriesMinAge">
                                        <option value="0">Toate vârstele</option>
                                        <option value="7">7+</option>
                                        <option value="13" selected>13+</option>
                                        <option value="16">16+</option>
                                        <option value="18">18+</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-danger w-100">Salvează seria</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Adaugă Episod -->
                <div class="tab-pane fade" id="addEpisode">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-video me-2"></i>Episod nou</h5>
                        </div>
                        <div class="card-body">
                            <form id="addEpisodeForm">
                                <div class="mb-3">
                                    <label class="form-label">Serie *</label>
                                    <select class="form-select" id="episodeSeries" required></select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Număr episod *</label>
                                    <input type="number" class="form-control" id="episodeNumber" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Titlu episod</label>
                                    <input type="text" class="form-control" id="episodeTitle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Link DoodStream *</label>
                                    <input type="url" class="form-control" id="doodstreamLink" placeholder="https://dood.li/e/..." required>
                                </div>
                                <button type="submit" class="btn btn-danger w-100">Salvează episodul</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Gestionare -->
                <div class="tab-pane fade" id="manage">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list me-2"></i>Toate seriile</h5>
                        </div>
                        <div class="card-body">
                            <div id="seriesList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        (async () => {
            const user = await checkAuth();
            if (!user || user.role !== 'admin') {
                document.getElementById('adminCheck').classList.remove('d-none');
                return;
            }
            document.getElementById('adminContent').classList.remove('d-none');
            await loadSeriesSelect();
            await loadSeriesList();
        })();
        
        async function loadSeriesSelect() {
            const res = await fetch('/api/series');
            const series = await res.json();
            const select = document.getElementById('episodeSeries');
            select.innerHTML = series.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }
        
        async function loadSeriesList() {
            const res = await fetch('/api/series');
            const series = await res.json();
            const container = document.getElementById('seriesList');
            container.innerHTML = series.map(s => `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${s.name}</strong>
                        <small class="text-muted ms-2">${s.slug}</small>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="deleteSeries(${s.id})">Șterge</button>
                </div>
            `).join('');
        }
        
        document.getElementById('addSeriesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('seriesName').value,
                slug: document.getElementById('seriesSlug').value || null,
                description: document.getElementById('seriesDescription').value,
                image_url: document.getElementById('seriesImage').value || null,
                min_age: parseInt(document.getElementById('seriesMinAge').value),
                type: 'anime'
            };
            const res = await fetch('/api/series', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                alert('Serie adăugată!');
                location.reload();
            } else {
                alert('Eroare: ' + result.message);
            }
        });
        
        document.getElementById('addEpisodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const seriesId = document.getElementById('episodeSeries').value;
            const episodeNumber = document.getElementById('episodeNumber').value;
            const title = document.getElementById('episodeTitle').value;
            const doodstreamLink = document.getElementById('doodstreamLink').value;
            
            // Obține seria pentru slug
            const resSeries = await fetch('/api/series');
            const allSeries = await resSeries.json();
            const series = allSeries.find(s => s.id == seriesId);
            
            const servers = { "DoodStream": doodstreamLink };
            
            const res = await fetch('/api/admin/episode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                body: JSON.stringify({ series_id: parseInt(seriesId), episode_number: parseInt(episodeNumber), title, servers })
            });
            const result = await res.json();
            if (result.success) {
                alert('Episod adăugat!');
                document.getElementById('addEpisodeForm').reset();
            } else {
                alert('Eroare: ' + result.message);
            }
        });
        
        window.deleteSeries = async (id) => {
            if (!confirm('Sigur ștergi această serie?')) return;
            const res = await fetch(`/api/admin/series/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            const result = await res.json();
            if (result.success) {
                alert('Serie ștearsă!');
                location.reload();
            } else {
                alert('Eroare: ' + result.message);
            }
        };
    </script>
</body>
</html>
