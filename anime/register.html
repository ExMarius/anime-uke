<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #e0e0e0; }
        .navbar { background: #000 !important; border-bottom: 2px solid #dc3545; }
        .card { background: #1a1a1a; border: none; border-radius: 16px; }
        .card-header { background: #dc3545; border-radius: 16px 16px 0 0; padding: 20px; }
        .form-control { background: #2c2c2c; border: none; color: white; padding: 12px; }
        .form-control:focus { background: #2c2c2c; color: white; box-shadow: 0 0 0 2px #dc3545; }
        .btn-danger { background: #dc3545; padding: 12px; font-weight: bold; }
        .btn-danger:hover { background: #b02a37; }
        a { color: #dc3545; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">Anime Uke</a>
            <a href="/" class="btn btn-outline-danger">← Acasă</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <h3 class="mb-0"><i class="fas fa-user-plus me-2"></i>Înregistrare</h3>
                    </div>
                    <div class="card-body p-4">
                        <div id="errorMsg" class="alert alert-danger d-none"></div>
                        <div id="successMsg" class="alert alert-success d-none"></div>
                        
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Nume utilizator *</label>
                                <input type="text" class="form-control" id="username" required>
                                <small class="text-muted">Minim 3 caractere, doar litere și cifre</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Parolă *</label>
                                <input type="password" class="form-control" id="password" required>
                                <small class="text-muted">Minim 6 caractere</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirmă parola *</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">
                                <i class="fas fa-user-plus me-2"></i>Creează cont
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-transparent border-0 pb-4">
                        Ai deja cont? <a href="/login.html">Autentifică-te</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Verifică dacă e deja logat
        checkAuth().then(user => {
            if (user) window.location.href = '/';
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = 'Parolele nu se potrivesc!';
                errorDiv.classList.remove('d-none');
                setTimeout(() => errorDiv.classList.add('d-none'), 3000);
                return;
            }
            
            if (password.length < 6) {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = 'Parola trebuie să aibă minim 6 caractere!';
                errorDiv.classList.remove('d-none');
                setTimeout(() => errorDiv.classList.add('d-none'), 3000);
                return;
            }
            
            const result = await register(username, email, password);
            if (result.success) {
                const successDiv = document.getElementById('successMsg');
                successDiv.textContent = result.message + (result.isAdmin ? ' Ești primul utilizator, ai rol de admin!' : '');
                successDiv.classList.remove('d-none');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = result.message;
                errorDiv.classList.remove('d-none');
                setTimeout(() => errorDiv.classList.add('d-none'), 3000);
            }
        });
    </script>
</body>
</html>
