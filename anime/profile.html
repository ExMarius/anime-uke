<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilul meu - Anime Uke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #e0e0e0; }
        .navbar { background: #000 !important; border-bottom: 2px solid #dc3545; }
        .card { background: #1a1a1a; border: none; border-radius: 16px; }
        .card-header { background: #dc3545; border-radius: 16px 16px 0 0; padding: 15px 20px; }
        .stat-box { background: #2c2c2c; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #dc3545; }
        .stat-label { color: #aaa; margin-top: 5px; }
        .progress { background: #2c2c2c; height: 20px; border-radius: 10px; }
        .progress-bar { background: #dc3545; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #b02a37; }
        .btn-outline-danger { border-color: #dc3545; color: #dc3545; }
        .btn-outline-danger:hover { background: #dc3545; color: white; }
        .list-group-item { background: #1a1a1a; border-color: #2c2c2c; color: #e0e0e0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">Anime Uke</a>
            <div>
                <a href="/" class="btn btn-outline-danger me-2">Acasă</a>
                <a href="#" id="logoutBtn" class="btn btn-danger">Ieșire</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-header text-center">
                        <h4><i class="fas fa-user-circle me-2"></i>Profilul meu</h4>
                    </div>
                    <div class="card-body text-center">
                        <i class="fas fa-user-circle fa-4x text-secondary mb-3"></i>
                        <h3 id="username">Încărcare...</h3>
                        <p class="text-muted" id="email"></p>
                        <hr>
                        <div class="stat-box mb-3">
                            <div class="stat-value" id="goldAmount">0</div>
                            <div class="stat-label"><i class="fas fa-coins me-1"></i>Gold</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="level">1</div>
                            <div class="stat-label">Nivel</div>
                            <div class="progress mt-2">
                                <div id="xpBar" class="progress-bar" style="width: 0%"></div>
                            </div>
                            <div class="small text-muted mt-1"><span id="currentXP">0</span> / <span id="nextLevelXP">100</span> XP</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-history me-2"></i>Ultimele vizionări</h5>
                    </div>
                    <div class="card-body">
                        <div id="recentViews" class="list-group">
                            <div class="text-center text-muted py-3">Se încarcă...</div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5><i class="fas fa-server me-2"></i>Server preferat</h5>
                    </div>
                    <div class="card-body">
                        <select id="preferredServer" class="form-select mb-3" style="background: #2c2c2c; color: white; border: none;">
                            <option value="DoodStream">DoodStream</option>
                            <option value="Voe">Voe</option>
                            <option value="MP4Upload">MP4Upload</option>
                            <option value="StreamTape">StreamTape</option>
                        </select>
                        <button id="savePrefBtn" class="btn btn-danger w-100">
                            <i class="fas fa-save me-2"></i>Salvează preferința
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let currentUser = null;
        
        (async () => {
            currentUser = await checkAuth();
            if (!currentUser) {
                window.location.href = '/login.html';
                return;
            }
            
            document.getElementById('username').textContent = currentUser.username;
            document.getElementById('email').textContent = currentUser.email;
            document.getElementById('goldAmount').textContent = currentUser.gold || 0;
            document.getElementById('level').textContent = currentUser.level || 1;
            
            // Încarcă profil complet
            const profile = await getUserProfile();
            if (profile.success) {
                document.getElementById('goldAmount').textContent = profile.gold;
                document.getElementById('level').textContent = profile.level;
                document.getElementById('currentXP').textContent = profile.xp;
                document.getElementById('nextLevelXP').textContent = profile.nextLevelXP;
                const percent = (profile.xp / profile.nextLevelXP) * 100;
                document.getElementById('xpBar').style.width = percent + '%';
                document.getElementById('xpBar').textContent = Math.round(percent) + '%';
            }
            
            // Încarcă preferința
            const prefs = await getUserPreferences();
            if (prefs.preferred_server) {
                document.getElementById('preferredServer').value = prefs.preferred_server;
            }
        })();
        
        document.getElementById('savePrefBtn').addEventListener('click', async () => {
            const server = document.getElementById('preferredServer').value;
            const result = await setPreferredServer(server);
            if (result.success) {
                alert('Preferința a fost salvată!');
            } else {
                alert('Eroare la salvare');
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
            window.location.href = '/';
        });
    </script>
</body>
</html>
