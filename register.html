<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - AnimeHub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #e94560; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #c73550; }
        .error { color: #ff6b6b; text-align: center; margin-top: 12px; font-size: 14px; }
        .success { color: #4caf50; text-align: center; margin-top: 12px; font-size: 14px; }
        .login-link { text-align: center; margin-top: 16px; color: rgba(255,255,255,0.7); }
        .login-link a { color: #e94560; text-decoration: none; }
        .back-link { display: block; text-align: center; margin-top: 12px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>📝 Creează cont</h2>
        <input type="text" id="username" placeholder="Nume utilizator" autocomplete="username">
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Parolă (min 4 caractere)" autocomplete="new-password">
        <button onclick="register()">Înregistrează-te</button>
        <div id="message"></div>
        <div class="login-link">
            Ai deja cont? <a href="/login.html">Autentifică-te</a>
        </div>
        <a href="/" class="back-link">← Înapoi la site</a>
    </div>
    
    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!username || !email || !password) {
                messageDiv.className = 'error';
                messageDiv.textContent = 'Completează toate câmpurile.';
                return;
            }
            
            if (password.length < 4) {
                messageDiv.className = 'error';
                messageDiv.textContent = 'Parola trebuie să aibă minim 4 caractere.';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    messageDiv.className = 'success';
                    messageDiv.textContent = 'Cont creat cu succes! Redirecționare către login...';
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    messageDiv.className = 'error';
                    messageDiv.textContent = data.error || 'Eroare la înregistrare.';
                }
            } catch(e) {
                messageDiv.className = 'error';
                messageDiv.textContent = 'Eroare de conexiune.';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
