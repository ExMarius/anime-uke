<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin • AnimeSphere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <nav class="bg-black border-b border-cyan-500 p-4 flex justify-between">
    <a href="index.html" class="flex items-center gap-3 text-2xl font-bold neon">🎌 AnimeSphere</a>
    <button onclick="logout()" class="bg-red-500 px-6 py-2 rounded-2xl">Logout</button>
  </nav>

  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-8">Panel Admin</h1>
    
    <div class="bg-[#111] rounded-3xl p-6 mb-8">
      <h2 class="text-2xl mb-4">Adaugă Serie Nouă</h2>
      <input id="title" placeholder="Titlu" class="w-full mb-3 bg-[#222] rounded-2xl px-5 py-4">
      <textarea id="desc" placeholder="Descriere" class="w-full mb-3 bg-[#222] rounded-2xl px-5 py-4 h-24"></textarea>
      <input id="poster" placeholder="Poster URL" class="w-full mb-3 bg-[#222] rounded-2xl px-5 py-4">
      <button onclick="addSeries()" class="bg-cyan-500 text-black font-bold px-8 py-4 rounded-2xl">Adaugă Serie</button>
    </div>

    <div class="bg-[#111] rounded-3xl p-6">
      <h2 class="text-2xl mb-4">Utilizatori</h2>
      <table id="users-table" class="w-full"></table>
    </div>
  </div>

  <script>
    initTailwind();
    async function addSeries() {
      const data = {
        type: "series",
        data: {
          title: document.getElementById('title').value,
          description: document.getElementById('desc').value,
          poster_url: document.getElementById('poster').value
        }
      };
      await apiCall('/admin', { method: 'POST', body: JSON.stringify(data) });
      alert('Serie adăugată!');
    }

    async function loadUsers() {
      const users = await apiCall('/admin');
      const html = users.map(u => `
        <tr class="border-b border-gray-700"><td class="p-4">${u.username}</td><td class="p-4">${u.points} puncte</td></tr>
      `).join('');
      document.getElementById('users-table').innerHTML = `<tr><th class="text-left p-4">Username</th><th class="text-left p-4">Puncte</th></tr>${html}`;
    }
    window.onload = loadUsers;
  </script>
</body>
</html>
