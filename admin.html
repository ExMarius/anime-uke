<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AnimeHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .navbar {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #e94560; }
        .nav-links a {
            color: #eee;
            text-decoration: none;
            margin-left: 1.5rem;
        }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .card h2 { color: #e94560; margin-bottom: 1rem; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.6); }
        button {
            background: #e94560;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #c73550; }
        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .success { background: rgba(76,175,80,0.2); color: #4caf50; }
        .error { background: rgba(244,67,54,0.2); color: #f44336; }
        .points-badge {
            background: #e94560;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: #e94560;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-left: 1rem;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍥 AnimeHub - Admin</div>
        <div class="nav-links">
            <a href="/">Acasă</a>
            <a href="/series.html">Toate Seriile</a>
            <a href="/login.html" id="loginLink">Login</a>
            <span id="userInfo" class="hidden">
                <span id="userPoints" class="points-badge">0 pts</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </span>
        </div>
    </nav>
    
    <div class="container">
        <div class="card">
            <h2>➕ Adaugă serie nouă</h2>
            <input type="text" id="seriesTitle" placeholder="Titlul seriei *">
            <textarea id="seriesDescription" rows="3" placeholder="Descriere (opțional)"></textarea>
            <input type="text" id="seriesCover" placeholder="URL imagine copertă (opțional)">
            <select id="seriesStatus">
                <option value="ongoing">În derulare</option>
                <option value="completed">Finalizat</option>
            </select>
            <button onclick="addSeries()">Adaugă serie</button>
            <div id="seriesMessage"></div>
        </div>
        
        <div class="card">
            <h2>➕ Adaugă episod nou</h2>
            <select id="episodeSeries"></select>
            <input type="number" id="episodeNumber" placeholder="Numărul episodului *">
            <input type="text" id="episodeTitle" placeholder="Titlu episod (opțional)">
            <input type="text" id="doodstreamUrl" placeholder="URL DoodStream *">
            <button onclick="addEpisode()">Adaugă episod</button>
            <div id="episodeMessage"></div>
        </div>
    </div>
    
    <script>
        let currentUser = null;
        let seriesList = [];
        
        async function loadUser() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    if (currentUser.role !== 'admin') {
                        window.location.href = '/';
                        return;
                    }
                    document.getElementById('loginLink').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userPoints').innerHTML = `${currentUser.points} pts`;
                } else {
                    window.location.href = '/login.html';
                }
            } catch(e) { window.location.href = '/login.html'; }
        }
        
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }
        
        async function loadSeriesForSelect() {
            try {
                const res = await fetch('/api/series');
                const data = await res.json();
                seriesList = data.series || [];
                const select = document.getElementById('episodeSeries');
                select.innerHTML = seriesList.map(s => `<option value="${s.id}">${s.title}</option>`).join('');
            } catch(e) { console.error(e); }
        }
        
        async function addSeries() {
            const title = document.getElementById('seriesTitle').value;
            const description = document.getElementById('seriesDescription').value;
            const cover_image = document.getElementById('seriesCover').value;
            const status = document.getElementById('seriesStatus').value;
            const msgDiv = document.getElementById('seriesMessage');
            
            if (!title) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Titlul este obligatoriu.';
                return;
            }
            
            try {
                const res = await fetch('/api/admin/series', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, cover_image, status })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = '✅ Serie adăugată cu succes!';
                    document.getElementById('seriesTitle').value = '';
                    document.getElementById('seriesDescription').value = '';
                    document.getElementById('seriesCover').value = '';
                    await loadSeriesForSelect();
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = data.error || 'Eroare la adăugare.';
                }
            } catch(e) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Eroare de conexiune.';
            }
        }
        
        async function addEpisode() {
            const series_id = document.getElementById('episodeSeries').value;
            const episode_number = parseInt(document.getElementById('episodeNumber').value);
            const title = document.getElementById('episodeTitle').value;
            const doodstream_url = document.getElementById('doodstreamUrl').value;
            const msgDiv = document.getElementById('episodeMessage');
            
            if (!series_id || !episode_number || !doodstream_url) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Completează toate câmpurile obligatorii (*).';
                return;
            }
            
            try {
                const res = await fetch('/api/admin/episodes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ series_id, episode_number, title, doodstream_url })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = '✅ Episod adăugat cu succes!';
                    document.getElementById('episodeNumber').value = '';
                    document.getElementById('episodeTitle').value = '';
                    document.getElementById('doodstreamUrl').value = '';
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = data.error || 'Eroare la adăugare.';
                }
            } catch(e) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Eroare de conexiune.';
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUser();
            await loadSeriesForSelect();
        });
    </script>
</body>
</html>
