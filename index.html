<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeSphere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <nav class="bg-black border-b border-cyan-500 p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <span class="text-3xl neon">🎌</span>
      <h1 class="text-3xl font-bold">AnimeSphere</h1>
    </div>
    <div id="nav-user" class="flex items-center gap-4"></div>
  </nav>

  <div class="max-w-7xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8">Seriile tale anime</h2>
    <div id="series-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
  </div>

  <button onclick="toggleChat()" 
    class="fixed bottom-8 right-8 bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl shadow-cyan-500/50">
    💬 Chat Live
  </button>

  <!-- Chat Sidebar -->
  <div id="chat-sidebar" class="hidden fixed bottom-8 right-8 w-96 h-[500px] bg-[#111] border border-cyan-500 rounded-2xl shadow-2xl flex flex-col">
    <div class="p-4 border-b flex justify-between">
      <span class="font-bold">Chat Global</span>
      <button onclick="toggleChat()" class="text-cyan-400">✕</button>
    </div>
    <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
    <div class="p-4 border-t flex gap-2">
      <input id="chat-input" type="text" placeholder="Scrie un mesaj..." 
        class="flex-1 bg-[#222] text-white px-4 py-2 rounded-xl focus:outline-none">
      <button onclick="sendChatMessage()" class="bg-cyan-500 px-6 rounded-xl font-bold">Trimite</button>
    </div>
  </div>

  <script>
    // ... (codul complet pentru încărcare serii, autentificare, etc. - inclus mai jos)
    initTailwind();
    async function loadSeries() {
      const series = await apiCall('/series');
      const grid = document.getElementById('series-grid');
      grid.innerHTML = series.map(s => `
        <a href="series.html?id=${s.id}" class="block bg-[#111] rounded-3xl overflow-hidden hover:scale-105 transition">
          <img src="${s.poster_url}" class="w-full h-64 object-cover">
          <div class="p-4">
            <h3 class="text-xl font-bold">${s.title}</h3>
            <p class="text-gray-400 text-sm">${s.description}</p>
          </div>
        </a>
      `).join('');
    }

    // Verificare login
    window.onload = () => {
      const t = getToken();
      const nav = document.getElementById('nav-user');
      if (t) {
        // simplificat - în producție apelezi /me sau decodezi JWT
        nav.innerHTML = `
          <span class="text-cyan-400">👋 Bun venit!</span>
          <a href="admin.html" class="bg-orange-500 px-4 py-2 rounded-2xl text-sm">Admin</a>
          <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-2xl text-sm">Logout</button>
        `;
        loadSeries();
      } else {
        nav.innerHTML = `<a href="login.html" class="bg-cyan-500 px-6 py-2 rounded-2xl">Login / Register</a>`;
      }
    };

    // Chat
    let ws;
    function toggleChat() {
      const sidebar = document.getElementById('chat-sidebar');
      sidebar.classList.toggle('hidden');
      if (!ws && !sidebar.classList.contains('hidden')) connectWebSocket();
    }

    function connectWebSocket() {
      ws = new WebSocket(`wss://${location.host}/chat`);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const container = document.getElementById('chat-messages');
        if (data.type === "message") {
          container.innerHTML += `<div><span class="text-cyan-400">${data.username}:</span> ${data.message}</div>`;
          container.scrollTop = container.scrollHeight;
        } else if (data.type === "history") {
          container.innerHTML = data.messages.map(m => 
            `<div><span class="text-cyan-400">${m.username}:</span> ${m.message}</div>`
          ).join('');
        }
      };
    }

    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      if (!ws || !input.value) return;
      ws.send(JSON.stringify({ type: "chat", username: currentUser || "User", message: input.value }));
      input.value = '';
    }
  </script>
</body>
</html>
