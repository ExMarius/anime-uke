<!-- Componenta Chat -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <h3>💬 Chat Live</h3>
    <span class="chat-status" id="chatStatus">🔴 Deconectat</span>
  </div>
  
  <div class="chat-messages" id="chatMessages">
    <div class="system-message">Conectare la chat...</div>
  </div>
  
  <div class="chat-online-users" id="onlineUsers">
    <div class="users-title">👥 Online</div>
    <div class="users-list" id="usersList"></div>
  </div>
  
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="Scrie un mesaj..." disabled>
    <button id="chatSendBtn" disabled>📤</button>
  </div>
</div>

<style>
.chat-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 350px;
  height: 500px;
  background: #1e1e2e;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  font-family: sans-serif;
}

.chat-header {
  padding: 12px;
  background: #2a2a3a;
  border-radius: 12px 12px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-header h3 {
  margin: 0;
  font-size: 16px;
  color: white;
}

.chat-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}

.chat-status.online { background: #4caf50; color: white; }
.chat-status.offline { background: #f44336; color: white; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.message {
  max-width: 80%;
  padding: 6px 10px;
  border-radius: 12px;
  font-size: 13px;
}

.message.own {
  align-self: flex-end;
  background: #4caf50;
  color: white;
}

.message.other {
  align-self: flex-start;
  background: #2a2a3a;
  color: #eee;
}

.message .username {
  font-size: 10px;
  font-weight: bold;
  margin-bottom: 2px;
  color: #aaa;
}

.message .text {
  word-wrap: break-word;
}

.system-message {
  text-align: center;
  font-size: 11px;
  color: #888;
  font-style: italic;
  margin: 4px 0;
}

.chat-online-users {
  border-top: 1px solid #2a2a3a;
  padding: 8px 12px;
  background: #252535;
}

.users-title {
  font-size: 11px;
  color: #aaa;
  margin-bottom: 4px;
}

.users-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 11px;
  color: #4caf50;
}

.chat-input-area {
  display: flex;
  padding: 12px;
  gap: 8px;
  border-top: 1px solid #2a2a3a;
}

#chatInput {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 20px;
  background: #2a2a3a;
  color: white;
  outline: none;
}

#chatSendBtn {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  background: #4caf50;
  color: white;
  cursor: pointer;
}

#chatSendBtn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>

<script>
// Variabile globale
let chatSocket = null;
let currentUsername = null;
let currentUserId = null;

// Funcție pentru conectarea la chat
async function connectToChat() {
  // Obține datele utilizatorului logat
  const authResponse = await fetch('/api/auth/me');
  if (!authResponse.ok) {
    console.log('Nu ești logat, chatul nu funcționează');
    return;
  }
  
  const authData = await authResponse.json();
  currentUsername = authData.user.username;
  currentUserId = authData.user.id;
  
  // Construiește URL-ul WebSocket
  const wsUrl = new URL('/ws', window.location.origin);
  wsUrl.protocol = wsUrl.protocol === 'https:' ? 'wss:' : 'ws:';
  wsUrl.searchParams.set('room', 'general');
  wsUrl.searchParams.set('username', currentUsername);
  wsUrl.searchParams.set('userId', currentUserId);
  
  // Creează conexiunea WebSocket
  chatSocket = new WebSocket(wsUrl);
  
  chatSocket.onopen = () => {
    console.log('Chat conectat');
    document.getElementById('chatStatus').textContent = '🟢 Conectat';
    document.getElementById('chatStatus').className = 'chat-status online';
    document.getElementById('chatInput').disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
  };
  
  chatSocket.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleChatMessage(data);
  };
  
  chatSocket.onclose = () => {
    console.log('Chat deconectat');
    document.getElementById('chatStatus').textContent = '🔴 Deconectat';
    document.getElementById('chatStatus').className = 'chat-status offline';
    document.getElementById('chatInput').disabled = true;
    document.getElementById('chatSendBtn').disabled = true;
    
    // Reconnect after 3 seconds
    setTimeout(connectToChat, 3000);
  };
  
  chatSocket.onerror = (error) => {
    console.error('Eroare WebSocket:', error);
  };
}

// Procesează mesajele primite
function handleChatMessage(data) {
  const messagesContainer = document.getElementById('chatMessages');
  
  switch (data.type) {
    case 'history':
      // Afișează istoricul mesajelor
      messagesContainer.innerHTML = '';
      data.messages.forEach(msg => {
        addMessageToChat(msg.username, msg.message, msg.username === currentUsername);
      });
      break;
      
    case 'message':
      addMessageToChat(data.username, data.message, data.username === currentUsername);
      break;
      
    case 'users':
      updateOnlineUsers(data.users);
      break;
      
    case 'system':
      const systemMsg = document.createElement('div');
      systemMsg.className = 'system-message';
      systemMsg.textContent = data.message;
      messagesContainer.appendChild(systemMsg);
      break;
  }
  
  // Auto-scroll la ultimul mesaj
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Adaugă un mesaj în chat
function addMessageToChat(username, message, isOwn) {
  const messagesContainer = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
  
  if (!isOwn) {
    const nameSpan = document.createElement('div');
    nameSpan.className = 'username';
    nameSpan.textContent = username;
    messageDiv.appendChild(nameSpan);
  }
  
  const textSpan = document.createElement('div');
  textSpan.className = 'text';
  textSpan.textContent = message;
  messageDiv.appendChild(textSpan);
  
  messagesContainer.appendChild(messageDiv);
}

// Actualizează lista utilizatorilor online
function updateOnlineUsers(users) {
  const usersList = document.getElementById('usersList');
  usersList.innerHTML = users.map(u => 
    `<span class="user-online">${u.username}</span>`
  ).join('');
}

// Trimite un mesaj
function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  
  if (message && chatSocket && chatSocket.readyState === WebSocket.OPEN) {
    chatSocket.send(JSON.stringify({
      type: 'message',
      message: message
    }));
    input.value = '';
  }
}

// Inițializează chatul după încărcarea paginii
document.addEventListener('DOMContentLoaded', () => {
  // Verifică dacă utilizatorul e logat
  setTimeout(() => {
    connectToChat();
  }, 1000);
  
  // Event listener pentru butonul de trimitere
  document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
  document.getElementById('chatInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendChatMessage();
  });
});
</script>
