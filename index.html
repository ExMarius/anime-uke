<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeHub - Platformă Anime</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .navbar {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        .nav-links a {
            color: #eee;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #e94560; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .hero {
            text-align: center;
            padding: 3rem 0;
            background: linear-gradient(135deg, #e94560, #0f3460);
            border-radius: 20px;
            margin-bottom: 2rem;
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .series-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .series-card:hover { transform: translateY(-5px); }
        .series-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .series-card h3 {
            padding: 0.8rem;
            font-size: 1rem;
            text-align: center;
        }
        .user-info {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .points-badge {
            background: #e94560;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: #e94560;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-left: 1rem;
        }
        
        /* Chat Button */
        .chat-toggle-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e94560;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: transform 0.3s;
        }
        .chat-toggle-btn:hover { transform: scale(1.1); }
        
        /* Chat Modal */
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 550px;
            background: #1e1e2e;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 1001;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-modal.active { display: flex; }
        .chat-header {
            background: #2a2a3a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a3a4a;
        }
        .chat-header h3 { margin: 0; font-size: 16px; }
        .chat-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
        }
        .message.own {
            align-self: flex-end;
            background: #e94560;
            color: white;
        }
        .message.other {
            align-self: flex-start;
            background: #2a2a3a;
            color: #eee;
        }
        .message .username {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 3px;
            color: #aaa;
        }
        .message.own .username { color: #ffb3c6; }
        .system-message {
            text-align: center;
            font-size: 11px;
            color: #888;
            font-style: italic;
            margin: 4px 0;
        }
        .users-online {
            padding: 8px 12px;
            background: #252535;
            border-top: 1px solid #3a3a4a;
            font-size: 11px;
            color: #aaa;
        }
        .users-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
        .user-online { color: #4caf50; }
        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid #3a3a4a;
            background: #252535;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #1e1e2e;
            color: white;
            outline: none;
        }
        .chat-input-area button {
            width: 40px;
            border: none;
            border-radius: 50%;
            background: #e94560;
            color: white;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍥 AnimeHub</div>
        <div class="nav-links">
            <a href="/">Acasă</a>

            <a href="/login.html" id="loginLink">Login</a>
            <span id="userInfo" class="hidden">
                <span id="userPoints" class="points-badge">0 pts</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </span>
        </div>
    </nav>
    
    <div class="container">
        <div class="hero">
            <h1>AnimeHub</h1>

        <h2 style="margin-top: 2rem;">Serii populare</h2>
        <div class="series-grid" id="seriesList"></div>
    </div>
    
    <!-- Buton Chat -->
    <button class="chat-toggle-btn" id="chatToggleBtn">💬</button>
    
    <!-- Chat Modal -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-header">
            <h3>💬 Chat Live</h3>
            <button class="chat-close" id="chatCloseBtn">×</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="system-message">Conectare la chat...</div>
        </div>
        <div class="users-online" id="usersOnline">
            <div>👥 Online: <span id="onlineCount">0</span></div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Scrie un mesaj..." disabled>
            <button id="chatSendBtn" disabled>📤</button>
        </div>
    </div>
